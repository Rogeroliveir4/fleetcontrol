{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Fleet Control{% endblock %}</title>
    {% tailwind_css %}
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-[#2b654d] text-white flex flex-col p-6 space-y-4">
        <div class="text-2xl font-bold mb-6">
            FLEET CONTROL
        </div>

        <nav class="flex flex-col gap-4">
            <a href="/" class="hover:bg-white/20 p-2 rounded">Dashboard</a>
            <a href="/movimentacoes" class="hover:bg-white/20 p-2 rounded">Movimentações</a>
            <a href="/veiculos" class="hover:bg-white/20 p-2 rounded">Veículos</a>
            <a href="/motoristas" class="hover:bg-white/20 p-2 rounded">Motoristas</a>
        </nav>

        <div class="mt-auto">
            <button class="bg-white text-[#2b654d] px-4 py-2 rounded hover:bg-gray-200">
                Alternar Tema
            </button>
        </div>
    </aside>

    <!-- ÁREA PRINCIPAL -->
    <main class="flex-1 p-10">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
