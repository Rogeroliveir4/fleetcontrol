<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Redefinida - FleetControl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-block p-4 rounded-2xl bg-gradient-to-br from-[#2b654d] to-[#49b48b] shadow-lg mb-4">
                <i class="fa-solid fa-check-circle text-3xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">FleetControl</h1>
            <p class="text-gray-600 dark:text-gray-300">Senha Redefinida</p>
        </div>

        <!-- Card -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8 border border-gray-100 dark:border-gray-700 text-center">
            <div class="w-20 h-20 rounded-full bg-green-100 dark:bg-green-900 flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-check text-3xl text-green-600 dark:text-green-400"></i>
            </div>
            
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-4">
                Senha Redefinida com Sucesso!
            </h2>
            
            <p class="text-gray-600 dark:text-gray-300 mb-8">
                Sua senha foi redefinida com sucesso. 
                Agora você pode fazer login com sua nova senha.
            </p>

            <div class="space-y-4">
                <a href="{% url 'login' %}" 
                   class="block w-full bg-gradient-to-r from-[#2b654d] to-[#3a8c6e] text-white font-semibold py-4 rounded-xl hover:shadow-lg transition-all duration-300">
                    <i class="fas fa-sign-in-alt mr-3"></i>
                    Fazer Login Agora
                </a>
                
                <a href="/" 
                   class="block w-full bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-medium py-3 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-600 transition-all duration-300">
                    <i class="fas fa-home mr-3"></i>
                    Voltar para a Página Inicial
                </a>
            </div>
        </div>

        <!-- Rodapé -->
        <div class="text-center mt-6">
            <p class="text-xs text-gray-500 dark:text-gray-400">
                © 2023 FleetControl • Sua senha foi atualizada com segurança
            </p>
        </div>
    </div>

    <script>
        // Auto-redirect após 10 segundos
        setTimeout(function() {
            window.location.href = "{% url 'login' %}";
        }, 10000);

        // Toggle dark mode
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
