{% extends "core/base.html" %}
{% block title %}Retorno do Veículo{% endblock %}

{% block content %}

<div class="max-w-4xl mx-auto px-2 sm:px-6 py-2 sm:py-6">
    <!-- HEADER -->
    <div class="mb-4 sm:mb-8">
        <div class="flex items-center gap-2 sm:gap-3 mb-2">
            <div class="w-2 h-6 bg-green-600 rounded-full"></div>
            <h1 class="text-lg sm:text-4xl font-bold text-gray-900 dark:text-black">
                Movimentação
            </h1>
        </div>
        <p class="text-gray-600 dark:text-gray-400 text-sm sm:text-base ml-4 sm:ml-5">Registrar retorno do veículo</p>
    </div>

    <div
        class="bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 max-w-4xl">

        <!-- KM Saída -->
        <div class="mb-4 sm:mb-6">
            <label class="block text-gray-700 dark:text-gray-300 mb-1 text-sm sm:text-base font-medium">
                Quilometragem de Saída
            </label>
            <div
                class="p-3 sm:p-4 rounded-lg bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-700 text-lg sm:text-2xl font-bold text-blue-700 dark:text-blue-300">
                {{mov.veiculo.km_atual}}
            </div>
        </div>

        <form method="post">
            {% csrf_token %}

                <!-- KM Retorno -->
        <div class="mb-4 sm:mb-6">
                <label class="block text-gray-700 dark:text-gray-300 mb-1 text-sm sm:text-base font-medium">
                    Quilometragem de Retorno (km) *
                </label>
                
                <input 
                    type="text" 
                    name="km_retorno" 
                    inputmode="decimal"
                    oninput="formatarKilometragem(this); calcDistancia();"
                    class="w-full px-3 py-2 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-200 border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-green-500 focus:border-transparent transition-colors text-sm sm:text-base"
                    placeholder="Ex: 458.325"
                    autocomplete="off"  >
        </div>

            <!-- Distância Percorrida -->
            <div class="mb-4 sm:mb-6">
                <label class="block text-gray-700 dark:text-gray-300 mb-1 text-sm sm:text-base font-medium">Distância
                    Percorrida</label>
                <div id="distancia"
                    class="p-3 sm:p-4 rounded-lg bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-700 text-lg sm:text-2xl font-bold text-green-700 dark:text-green-300">
                    0 km
                </div>
            </div>

            <!-- Observações -->
            <div class="mb-4 sm:mb-6">
                <label
                    class="block text-gray-700 dark:text-gray-300 mb-1 text-sm sm:text-base font-medium">Observações</label>
                <textarea name="observacoes" rows="3"
                    class="w-full px-3 py-2 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-200 border border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-green-500 focus:border-transparent transition-colors text-sm sm:text-base"
                    placeholder="Adicione observações sobre o retorno (opcional)"></textarea>
            </div>

            <!-- Botões -->
            <div class="flex flex-col sm:flex-row gap-2 sm:gap-3 justify-end">
                <a href="{% url 'lista_movimentacoes' %}"
                    class="px-4 py-2 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 rounded-lg text-sm sm:text-base text-center w-full sm:w-auto order-2 sm:order-1 transition-colors font-medium">
                    Cancelar
                </a>

                <button type="submit"
                    class="px-4 py-2 bg-green-600 hover:bg-green-700 dark:bg-green-700 dark:hover:bg-green-600 text-white rounded-lg flex items-center justify-center gap-2 text-sm sm:text-base w-full sm:w-auto order-1 sm:order-2 transition-colors font-medium shadow-sm">
                    <i class="fa-solid fa-check"></i> Registrar Retorno
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function formatarKilometragem(input) {
        // Remove tudo que não for número
        let valor = input.value.replace(/[^0-9]/g, '');
        
        // Se tiver mais de 3 dígitos, insere o ponto antes dos últimos 3 dígitos
        if (valor.length > 3) {
            const parteInteira = valor.slice(0, -3);
            const parteDecimal = valor.slice(-3);
            valor = parteInteira + '.' + parteDecimal;
        }
        
        // Atualiza o valor do input
        input.value = valor;
    }
    
    function formatarNumero(numero) {
        //  Formatar número com separador de milhares
        return numero.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    function calcDistancia() {
        console.log('=== INICIANDO CÁLCULO ===');
        
        // Pegar KM Saída do template
        let km_saida_text = "{{ mov.veiculo.km_atual }}";
        console.log('KM Saída do template:', km_saida_text);
        
        // Converter KM Saída
        const km_saida = parseFloat(km_saida_text.replace(',', '.')) || 0;
        console.log('KM Saída convertido:', km_saida);
        
        // Pegar KM Retorno do input
        const input = document.querySelector("input[name='km_retorno']");
        const inputValue = input.value;
        console.log('KM Retorno digitado:', inputValue);
        
        // Converter KM Retorno
        const km_retorno = parseFloat(inputValue.replace(',', '.')) || 0;
        console.log('KM Retorno convertido:', km_retorno);
        
        // Calcular diferença em METROS (km * 1000)
        const diferencaMetros = (km_retorno - km_saida) * 1000;
        console.log('Diferença calculada em metros:', diferencaMetros);
        
        // Atualizar display
        const distanciaElement = document.getElementById("distancia");
        if (distanciaElement) {
            if (inputValue === '' || km_retorno === 0) {
                distanciaElement.textContent = "0 km";
                distanciaElement.className = "p-3 sm:p-4 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-lg sm:text-2xl font-bold text-gray-500 dark:text-gray-400";
            } else if (diferencaMetros >= 0) {
                // ✅ Aplicar formatação com separador de milhares para METROS
                const diferencaFormatada = formatarNumero(Math.round(diferencaMetros));
                distanciaElement.textContent = diferencaFormatada + " Km";
                distanciaElement.className = "p-3 sm:p-4 rounded-lg bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-700 text-lg sm:text-2xl font-bold text-green-700 dark:text-green-300";
            } else {
                distanciaElement.textContent = "Valor inválido";
                distanciaElement.className = "p-3 sm:p-4 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-700 text-lg sm:text-2xl font-bold text-red-700 dark:text-red-300";
            }
        }
        
        console.log('=== FIM DO CÁLCULO ===');
    }

    document.addEventListener('DOMContentLoaded', function() {
        const input = document.querySelector("input[name='km_retorno']");
        if (input) {
            // Primeiro formata, depois calcula
            input.addEventListener('input', function() {
                formatarKilometragem(this);
                calcDistancia();
            });
        }
        calcDistancia();
    });
</script>

{% endblock %}
