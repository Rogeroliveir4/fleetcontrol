<!-- paginacao_desktop.html -->
{% if veiculos.has_other_pages %}
<div class="flex items-center justify-between">
    <div class="text-sm text-gray-600 dark:text-gray-400">
        Mostrando {{ veiculos.start_index }}-{{ veiculos.end_index }} de {{ veiculos.paginator.count }}
    </div>
    <div class="flex gap-2">
        {% if veiculos.has_previous %}
        <button onclick="irParaPagina(1)" 
                class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm">
            Primeira
        </button>
        <button onclick="irParaPagina({{ veiculos.previous_page_number }})" 
                class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm">
            Anterior
        </button>
        {% endif %}

        <span class="px-3 py-2 text-gray-700 dark:text-gray-300 text-sm">
            Página {{ veiculos.number }} de {{ veiculos.paginator.num_pages }}
        </span>

        {% if veiculos.has_next %}
        <button onclick="irParaPagina({{ veiculos.next_page_number }})" 
                class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm">
            Próxima
        </button>
        <button onclick="irParaPagina({{ veiculos.paginator.num_pages }})" 
                class="px-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-sm">
            Última
        </button>
        {% endif %}
    </div>
</div>
{% endif %}
